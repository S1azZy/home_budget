AllCops:
  TargetRubyVersion: 3.1.1
  NewCops: enable
  Exclude:
    - 'db/schema.rb'
    - 'bin/*'

require:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-performance

Style/Documentation:
  Enabled: false

Style/HashSyntax:
  EnforcedShorthandSyntax: consistent

Style/StringLiterals:
  EnforcedStyle: double_quotes
  ConsistentQuotesInMultiline: true
